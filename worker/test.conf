# /srv/mystack/nginx/default.conf

# =========================
# HTTP -> HTTPS
# =========================
server {
    listen 80;
    server_name creepender.top www.creepender.top;
    return 301 https://$host$request_uri;
}

# =========================
# HTTPS 主站
# =========================
server {
    listen 443 ssl http2;
    server_name creepender.top www.creepender.top;

    ssl_certificate     /etc/nginx/ssl/creepender.top.pem;
    ssl_certificate_key /etc/nginx/ssl/creepender.top.key;

    client_max_body_size 100M;
    proxy_request_buffering off;

    # 通用反代头
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade            $http_upgrade;
    proxy_set_header Connection         "upgrade";

    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    # -------------------------
    # fishbowl（Next）
    # 主站根路径
    # -------------------------
    location = / {
        proxy_pass http://fishbowl_app:3000;
    }

    location ^~ /_next/ {
        proxy_pass http://fishbowl_app:3000;
    }

    location / {
        proxy_pass http://fishbowl_app:3000;
    }

    # -------------------------
    # SCS 后端 API（Spring Boot）
    # 保留原来的 /api/ 前缀
    # -------------------------
    location = /api {
        return 301 /api/;
    }

    location ^~ /api/ {
        proxy_pass http://scs-backend:8081/api/;
    }

    # -------------------------
    # SCS 静态图片
    # -------------------------
    location = /images {
        return 301 /images/;
    }

    location ^~ /images/ {
        proxy_pass http://scs-backend:8081/images/;
    }

    # -------------------------
    # SCS AI 服务（FastAPI）
    # -------------------------
    location = /ai {
        return 301 /ai/;
    }

    location ^~ /ai/ {
        proxy_pass http://scs-ai-service:8000/;
    }

    # -------------------------
    # 健康检查
    # -------------------------
    location = /healthz {
        add_header Content-Type text/plain;
        return 200 'ok';
    }
}

# =========================
# barevid 独立子域名
# 如改用 fishbowl 域名，只需替换 server_name 与证书路径
# 并把后端配置中的 EXPORT_FRONTEND_URL / EXPORT_API_URL / EXPORT_PUBLIC_BASE_URL
# 统一设为 https://barevid.creepender.top
# =========================
server {
    listen 80;
    server_name barevid.creepender.top;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name barevid.creepender.top;

    ssl_certificate     /etc/nginx/ssl/barevid.creepender.top.pem;
    ssl_certificate_key /etc/nginx/ssl/barevid.creepender.top.key;

    # worker 上传成片会走这里；要明显大于常见导出视频体积
    client_max_body_size 2g;
    proxy_request_buffering off;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";

    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    location = /api {
        return 301 /api/;
    }

    location ^~ /api/ {
        proxy_pass http://barevid-api:8000;
    }

    location = /internal {
        return 301 /internal/;
    }

    location ^~ /internal/ {
        proxy_pass http://barevid-api:8000;
    }

    location = /media {
        return 301 /media/;
    }

    location ^~ /media/ {
        alias /data/storage/;
        autoindex off;

        try_files $uri $uri/ =404;

        sendfile on;
        tcp_nopush on;

        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://barevid-web:3000;
    }

    location = /healthz {
        add_header Content-Type text/plain;
        return 200 'ok';
    }
}